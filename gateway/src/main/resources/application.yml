server:
  port: 8080

spring:
  application:
    name: security-gateway

  datasource:
    url: jdbc:mysql://localhost:3306/security
    username: aashutosh
    password: Bank@123
    driverClassName: com.mysql.cj.jdbc.Driver

  jpa:
    hibernate:
      ddl-auto: update
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQLDialect
    show-sql: true

  cloud:
    gateway:
      routes:
        - id: security-service
          uri: http://localhost:8081
          predicates:
            - Path=/auth/security/**

        # Swagger UI Route (For API Gateway to Proxy Security Module Swagger)
        - id: swagger-ui
          uri: http://localhost:8081
          predicates:
            - Path=/swagger-ui/**, /v3/api-docs/**, /v3/api-docs/swagger-config
    compatibility-verifier:
      enabled: false
  main:
    web-application-type: reactive

