server:
  port: 8085

spring:
  application:
    name: payments-service

  datasource:
    url: jdbc:mysql://localhost:3306/payments
    username: aashutosh
    password: Bank@123
    driverClassName: com.mysql.cj.jdbc.Driver

  jpa:
    hibernate:
      ddl-auto: update
