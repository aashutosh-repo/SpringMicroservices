server:
  port: 8081
spring:
 application:
   name: security-service
 datasource:
  url: jdbc:mysql://localhost:3306/security
  username: aashutosh
  password : Bank@123
  driverClassName: com.mysql.cj.jdbc.Driver

 jpa:
  hibernate:
   ddl-auto: update
   show-sql: true
  properties:
   hibernate:
    dialect: org.hibernate.dialect.MySQLDialect
 security:
  oauth2:
   resourceserver:
    jwt:
     issuer-uri: http://localhost:8081
springdoc:
 swagger-ui:
  path: /swagger-ui.html
 api-docs:
  path: /v3/api-docs
eureka:
 client:
  service-url:
   defaultZone: http://localhost:8761/eureka
  register-with-eureka: true
  fetch-registry: true
logging:
 level:
  org:
   hibernate: DEBUG
